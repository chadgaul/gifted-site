<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gifted – Gift List App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 16px; color: #6b7280; line-height: 1.5; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #6366f1;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 17px;
    }
    .btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎁</div>
    <h1>Gifted</h1>
    <p>The smarter way to manage gift lists, share wishlists, and coordinate with family.</p>
    <a class="btn" href="https://apps.apple.com/app/id6738561969">Download on the App Store</a>
  </div>
  <script type="module">
    import TelemetryDeck from 'https://cdn.jsdelivr.net/npm/@telemetrydeck/sdk/dist/telemetrydeck.min.js';
    const td = new TelemetryDeck({
      appID: 'F9681568-C11D-472E-A2FE-D0F18AAB59B2',
      clientUser: 'anonymous'
    });
    td.signal('webLandingPageView');
  </script>
</body>
</html>
